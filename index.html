<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta charset="utf-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    * { box-sizing: border-box }
    body, html, input, select, button { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important }

    /* ── Layout (core — unchanged from skeleton) ───────────────────────── */
    #app { display: flex; height: 100dvh; overflow: hidden }
    #sidebar { width: 240px; flex-shrink: 0; background: #f8f9fa; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; transition: transform .25s ease, width .25s ease; overflow: hidden }
    #sidebar.collapsed { width: 0; border: none }
    #sidebar-inner { width: 240px; display: flex; flex-direction: column; height: 100%; overflow: hidden }
    .sidebar-header { padding: 14px 12px 10px; border-bottom: 1px solid #dee2e6; display: flex; align-items: center; justify-content: space-between }
    .sidebar-header h6 { margin: 0; font-size: 13px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: .05em }
    #record-list { flex: 1; overflow-y: auto; padding: 6px }
    .record-item { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #333; min-height: 40px }
    .record-item:hover { background: #e9ecef }
    .record-item.active { background: #E6F1FB; color: #0C447C; font-weight: 500 }
    .record-item .record-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .record-item .btn-icon-sm { width: 28px; height: 28px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; background: none; border-radius: 4px; font-size: 14px; color: #888; cursor: pointer }
    .record-item .btn-icon-sm:hover { background: #dee2e6; color: #333 }
    .sidebar-footer { padding: 8px }
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100 }
    #sidebar-overlay.show { display: block }
    @media(max-width:640px) {
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 101; transform: translateX(-100%) }
      #sidebar.open { transform: translateX(0) }
    }
    #main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0 }
    #topbar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #dee2e6; background: #fff; flex-shrink: 0 }
    #record-title { font-size: 16px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    #content { padding: 12px; flex: 1 }
    .btn-icon { background: none; border: none; cursor: pointer; padding: 0; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 18px; color: #444; -webkit-tap-highlight-color: transparent }
    .btn-icon:hover, .btn-icon:focus-visible { background: #f0f0f0 }
    .btn-icon.danger { color: #c0392b }
    .btn-icon.danger:hover { background: #fdecea }
    .form-control, .form-select { min-height: 44px; font-size: 15px !important }
    .btn { min-height: 44px }
    .btn-sm { min-height: 40px }
    #no-record { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #aaa; gap: 12px; text-align: center; padding: 40px }
    .nav-tabs .nav-link { color: #555; font-size: 14px }
    .nav-tabs .nav-link.active { color: #000; font-weight: 500 }

    /* ── Habit-tracker-specific styles ──────────────────────────────────── */
    .habit-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px }
    .habit-row input[type=checkbox] { width: 22px; height: 22px }
    .habit-row .name { flex: 1; font-size: 15px }
    .manage-row { display: flex; align-items: center; gap: 8px; padding: 6px 0 }
    .manage-row .name { flex: 1; font-size: 14px }
    #heatmap-scroll { overflow-x: auto; padding-bottom: 6px }
    #heatmap { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 14px); gap: 3px; width: max-content }
    .hm-cell { width: 14px; height: 14px; border-radius: 3px; background: #ebedf0 }
    .hm-cell[data-level="1"] { background: #cfe8cd }
    .hm-cell[data-level="2"] { background: #8fd18a }
    .hm-cell[data-level="3"] { background: #4cb04a }
    .hm-cell[data-level="4"] { background: #1f8b1f }
    #heatmap-legend { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; margin-top: 8px }
  </style>
</head>
<body>
  <div id="app">

    <!-- Sidebar (core) -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
      <div id="sidebar-inner">
        <div class="sidebar-header">
          <h6>Trackers</h6>
          <button class="btn-icon-sm" onclick="toggleSidebar()" aria-label="Close"><i class="bi bi-x-lg"></i></button>
        </div>
        <div id="record-list"></div>
        <div class="sidebar-footer">
          <button class="btn btn-sm btn-outline-primary w-100" onclick="newRecord()"><i class="bi bi-plus me-1"></i>New tracker</button>
        </div>
      </div>
    </div>

    <!-- Main (core) -->
    <div id="main">
      <div id="topbar">
        <button class="btn-icon" onclick="toggleSidebar()" aria-label="Menu"><i class="bi bi-list" style="font-size:22px"></i></button>
        <span id="record-title">Select a tracker</span>
        <button class="btn-icon" id="share-btn" onclick="shareRecord()" aria-label="Share" title="Share via link" style="display:none"><i class="bi bi-share"></i></button>
        <button class="btn-icon danger" id="reset-btn" onclick="resetAll()" aria-label="Reset" style="display:none"><i class="bi bi-trash"></i></button>
      </div>

      <div id="content">
        <div id="no-record">
          <i class="bi bi-check2-square" style="font-size:48px;opacity:.3"></i>
          <div>Open the menu to select or create a tracker</div>
          <button class="btn btn-primary" onclick="toggleSidebar();setTimeout(()=>newRecord(),300)"><i class="bi bi-plus me-1"></i>New tracker</button>
        </div>

        <div id="record-ui" style="display:none">
          <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('overview',this)"><i class="bi bi-grid-3x3 me-1"></i>Overview</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('today',this)"><i class="bi bi-check2-square me-1"></i>Today</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('manage',this)"><i class="bi bi-gear me-1"></i>Manage habits</button></li>
          </ul>

          <!-- Overview: GitHub-style heatmap -->
          <div id="tab-overview">
            <div id="heatmap-scroll"><div id="heatmap"></div></div>
            <div id="heatmap-legend">Less <span class="hm-cell"></span><span class="hm-cell" data-level="1"></span><span class="hm-cell" data-level="2"></span><span class="hm-cell" data-level="3"></span><span class="hm-cell" data-level="4"></span> More</div>
          </div>

          <!-- Today: checklist -->
          <div id="tab-today" style="display:none">
            <div class="mb-2" style="font-size:13px;color:#888" id="today-date"></div>
            <div id="habit-checklist"></div>
          </div>

          <!-- Manage: add/remove habits -->
          <div id="tab-manage" style="display:none">
            <div class="d-flex gap-2 mb-3">
              <input type="text" class="form-control" id="new-habit-name" placeholder="New habit name">
              <button class="btn btn-primary" onclick="addHabit()"><i class="bi bi-plus"></i></button>
            </div>
            <div id="habit-manage-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════════════
       APP CONFIG
       ════════════════════════════════════════════════════════════════════ */
    const STORAGE_KEY = 'habit_tracker_v1';
    const APP_LABEL = 'tracker';
    const HEATMAP_DAYS = 140; // ~20 weeks, GitHub-style

    /* ════════════════════════════════════════════════════════════════════
       DOMAIN MODEL + CALCULATION
       data = { habits: [{id, name}], log: { 'YYYY-MM-DD': [habitId, ...] } }
       ════════════════════════════════════════════════════════════════════ */
    let data = { habits: [], log: {} };

    function todayKey() { return new Date().toISOString().slice(0, 10); }

    function addHabit() {
      const inp = document.getElementById('new-habit-name');
      const name = inp.value.trim();
      if (!name) return;
      data.habits.push({ id: Date.now(), name });
      inp.value = '';
      onUpdate();
    }
    function removeHabit(id) {
      if (!confirm('Remove this habit? Past completions for it will also be removed.')) return;
      data.habits = data.habits.filter(h => h.id !== id);
      Object.keys(data.log).forEach(day => {
        data.log[day] = data.log[day].filter(hid => hid !== id);
        if (!data.log[day].length) delete data.log[day];
      });
      onUpdate();
    }
    function toggleHabitToday(id) {
      const key = todayKey();
      const done = data.log[key] || [];
      data.log[key] = done.includes(id) ? done.filter(x => x !== id) : [...done, id];
      onUpdate();
    }

    function renderChecklist() {
      document.getElementById('today-date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
      const done = data.log[todayKey()] || [];
      const el = document.getElementById('habit-checklist');
      el.innerHTML = data.habits.length ? data.habits.map(h => `
        <label class="habit-row">
          <input type="checkbox" ${done.includes(h.id) ? 'checked' : ''} onchange="toggleHabitToday(${h.id})">
          <span class="name">${esc(h.name)}</span>
        </label>`).join('') : '<p style="font-size:13px;color:#888">No habits yet — add some in "Manage habits".</p>';
    }
    function renderManageList() {
      const el = document.getElementById('habit-manage-list');
      el.innerHTML = data.habits.length ? data.habits.map(h => `
        <div class="manage-row">
          <span class="name">${esc(h.name)}</span>
          <button class="btn-icon danger" onclick="removeHabit(${h.id})"><i class="bi bi-trash"></i></button>
        </div>`).join('') : '<p style="font-size:13px;color:#888">No habits yet.</p>';
    }
    function renderHeatmap() {
      const total = data.habits.length;
      const el = document.getElementById('heatmap');
      const today = new Date();
      const cells = [];
      for (let i = HEATMAP_DAYS - 1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const completed = (data.log[key] || []).length;
        const level = total === 0 || completed === 0 ? 0 : Math.min(4, Math.ceil((completed / total) * 4));
        cells.push({ key, completed, total, level });
      }
      el.innerHTML = cells.map(c =>
        `<div class="hm-cell" data-level="${c.level}" title="${c.key}: ${c.completed}/${c.total} habits"></div>`
      ).join('');
    }
    function renderDomain() {
      renderChecklist();
      renderManageList();
      renderHeatmap();
    }

    /* ════════════════════════════════════════════════════════════════════
       CORE INFRASTRUCTURE — records, persistence, sidebar, URL sharing
       ════════════════════════════════════════════════════════════════════ */
    let records = {};
    let currentId = null;

    function saveAll() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch (e) {} }
    function loadAll() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) records = JSON.parse(raw); } catch (e) {} }
    function uid() { return Math.random().toString(36).slice(2, 10); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function newRecord() {
      const name = prompt(`New ${APP_LABEL} name:`, `My habits`); if (!name) return;
      const id = uid();
      records[id] = { name: name.trim(), data: { habits: [], log: {} } };
      saveAll();
      selectRecord(id);
      renderSidebar();
      toggleSidebar();
    }
    function selectRecord(id) {
      if (!records[id]) return;
      currentId = id;
      data = records[id].data;
      document.getElementById('no-record').style.display = 'none';
      document.getElementById('record-ui').style.display = '';
      document.getElementById('record-title').textContent = records[id].name;
      document.getElementById('share-btn').style.display = '';
      document.getElementById('reset-btn').style.display = '';
      showTab('overview', document.querySelector('.nav-link'));
      renderSidebar();
      onUpdate();
    }
    function renameRecord(id, e) {
      e.stopPropagation();
      const name = prompt(`Rename ${APP_LABEL}:`, records[id].name); if (!name) return;
      records[id].name = name.trim();
      if (currentId === id) document.getElementById('record-title').textContent = records[id].name;
      saveAll(); renderSidebar();
    }
    function deleteRecord(id, e) {
      e.stopPropagation();
      if (!confirm(`Delete "${records[id].name}"?`)) return;
      delete records[id];
      saveAll();
      if (currentId === id) {
        currentId = null; data = { habits: [], log: {} };
        document.getElementById('no-record').style.display = '';
        document.getElementById('record-ui').style.display = 'none';
        document.getElementById('record-title').textContent = 'Select a tracker';
        document.getElementById('share-btn').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';
      }
      renderSidebar();
    }
    function renderSidebar() {
      const list = document.getElementById('record-list');
      const ids = Object.keys(records);
      if (!ids.length) { list.innerHTML = '<div style="padding:12px;font-size:13px;color:#aaa;text-align:center">No trackers yet</div>'; return; }
      list.innerHTML = ids.map(id => `
        <div class="record-item${id === currentId ? ' active' : ''}" onclick="selectRecord('${id}');toggleSidebar()">
          <i class="bi bi-check2-square" style="font-size:15px;flex-shrink:0"></i>
          <span class="record-name">${esc(records[id].name)}</span>
          <button class="btn-icon-sm" onclick="renameRecord('${id}',event)" title="Rename"><i class="bi bi-pencil"></i></button>
          <button class="btn-icon-sm" onclick="deleteRecord('${id}',event)" title="Delete" style="color:#c0392b"><i class="bi bi-trash"></i></button>
        </div>`).join('');
    }

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      if (window.innerWidth <= 640) {
        const opening = !sb.classList.contains('open');
        sb.classList.toggle('open', opening);
        document.getElementById('sidebar-overlay').classList.toggle('show', opening);
      } else {
        sb.classList.toggle('collapsed');
      }
    }
    function showTab(name, btn) {
      ['overview', 'today', 'manage'].forEach(t => document.getElementById('tab-' + t).style.display = t === name ? '' : 'none');
      document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function shareRecord() {
      if (!currentId) return;
      const payload = { name: records[currentId].name, data };
      const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(payload));
      const url = location.href.split('#')[0] + '#share=' + compressed;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('share-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check"></i>';
        setTimeout(() => btn.innerHTML = orig, 2000);
      }).catch(() => prompt('Copy this link:', url));
    }
    function checkUrlShare() {
      const hash = location.hash;
      if (!hash.startsWith('#share=')) return;
      try {
        const compressed = hash.slice(7);
        const payload = JSON.parse(LZString.decompressFromEncodedURIComponent(compressed));
        if (!payload || !payload.data) return;
        if (!confirm(`You've been sent a ${APP_LABEL}: "${payload.name}". Import it?`)) { history.replaceState(null, '', location.pathname); return; }
        const id = uid();
        records[id] = { name: payload.name, data: payload.data };
        saveAll();
        selectRecord(id);
        renderSidebar();
        history.replaceState(null, '', location.pathname);
      } catch (e) { console.warn('Invalid share URL'); }
    }

    function onUpdate() {
      if (currentId) { records[currentId].data = data; saveAll(); }
      renderDomain();
    }
    function resetAll() {
      if (!confirm(`Clear all habits and history in this ${APP_LABEL}?`)) return;
      data = { habits: [], log: {} }; onUpdate();
    }

    // ─── Init ───────────────────────────────────────────────────────────
    loadAll();
    renderSidebar();
    checkUrlShare();
    if (!currentId) {
      const ids = Object.keys(records);
      if (ids.length === 1) selectRecord(ids[0]);
    }
  </script>
</body>
</html>
